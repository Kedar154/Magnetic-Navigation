<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagNav · Flight Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090f;
  --surf:    #0c1119;
  --surf2:   #111a26;
  --border:  #1a2535;
  --cyan:    #00d4ff;
  --green:   #00e87a;
  --orange:  #ff8c42;
  --purple:  #a855f7;
  --red:     #ff4d6d;
  --yellow:  #f5c518;
  --text:    #c8d8e8;
  --muted:   #3d5470;
  --mono:    'Space Mono', monospace;
  --sans:    'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;min-height:52px;
  border-bottom:1px solid var(--border);
  background:rgba(12,17,25,0.98);
  backdrop-filter:blur(12px);
  z-index:200;flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo h1{font-size:17px;font-weight:800;letter-spacing:3px;color:#fff;text-transform:uppercase;}
.logo sub{font-family:var(--mono);font-size:9px;color:var(--cyan);letter-spacing:1px;display:block;margin-top:1px;}
.hdr-status{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;gap:16px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#hdr-info{color:var(--cyan);}

/* ── Layout: sidebar + main ── */
.body-wrap{display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
aside{
  width:260px;min-width:260px;
  border-right:1px solid var(--border);
  background:var(--surf);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.aside-top{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.aside-top h2{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.flight-list{overflow-y:auto;flex-shrink:0;max-height:230px;}
.f-card{
  display:flex;align-items:center;gap:10px;
  padding:11px 16px;border-bottom:1px solid rgba(26,37,53,.5);
  cursor:pointer;transition:background .15s;
}
.f-card:hover{background:rgba(0,212,255,.04);}
.f-card.active{background:rgba(0,212,255,.09);border-left:2px solid var(--cyan);padding-left:14px;}
.f-num{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--cyan);}
.f-meta{font-size:11px;color:var(--muted);margin-top:1px;}

.lines-section{padding:12px 16px;border-top:1px solid var(--border);overflow-y:auto;flex:1;}
.lines-section h3{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.line-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.ln-btn{
  background:rgba(26,37,53,.7);border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:9px;
  padding:6px 4px;border-radius:4px;cursor:pointer;
  text-align:center;transition:all .12s;
}
.ln-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.ln-btn.active{background:var(--cyan);color:var(--bg);border-color:var(--cyan);}
.ln-btn.cal{border-color:rgba(168,85,247,.35);color:var(--purple);}
.ln-btn.cal.active{background:var(--purple);color:#fff;border-color:var(--purple);}

/* ── Main ── */
main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}

/* ── Stats row ── */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.sc{
  flex:1;min-width:100px;
  background:var(--surf);border:1px solid var(--border);
  border-radius:8px;padding:11px 13px;position:relative;overflow:hidden;
}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.sc.c1::after{background:var(--cyan);}
.sc.c2::after{background:var(--green);}
.sc.c3::after{background:var(--orange);}
.sc.c4::after{background:var(--purple);}
.sc.c5::after{background:var(--red);}
.sc.c6::after{background:var(--yellow);}
.sc-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.sc-val{font-family:var(--mono);font-size:18px;font-weight:700;color:#fff;}
.sc-unit{font-size:10px;color:var(--muted);margin-left:3px;}

/* ── Sim controls ── */
.sim-panel{
  background:var(--surf);border:1px solid var(--border);
  border-radius:8px;padding:11px 16px;
  display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.sim-btn{
  background:transparent;border:1px solid var(--cyan);
  color:var(--cyan);font-family:var(--mono);font-size:10px;
  padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .12s;white-space:nowrap;
}
.sim-btn:hover,.sim-btn.active{background:var(--cyan);color:var(--bg);}
.sim-btn.reset{border-color:var(--muted);color:var(--muted);}
.sim-btn.reset:hover{border-color:var(--text);color:var(--text);background:transparent;}
.spd-wrap{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9px;color:var(--muted);}
.spd-wrap input{width:80px;accent-color:var(--cyan);}
#spd-lbl{color:var(--text);min-width:24px;}
.sim-track{flex:1;height:4px;background:var(--border);border-radius:2px;cursor:pointer;position:relative;}
.sim-fill{height:100%;background:linear-gradient(to right,var(--cyan),var(--purple));border-radius:2px;width:0%;transition:width .08s linear;}
.sim-time{font-family:var(--mono);font-size:10px;color:var(--muted);min-width:90px;text-align:right;}

/* ── Panels ── */
.panel{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ph{
  padding:11px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ph-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;}
.ph-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid;}
.pb{padding:14px;}
.cw{position:relative;}
.cw.h200{height:200px;}
.cw.h260{height:260px;}
.cw.h320{height:320px;}

/* ── 2-col grid ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── Legend ── */
.legend{
  display:flex;gap:14px;flex-wrap:wrap;
  font-family:var(--mono);font-size:9px;
  padding:8px 14px;border-top:1px solid var(--border);
}
.li{display:flex;align-items:center;gap:5px;color:var(--muted);}
.ld{width:14px;height:2px;border-radius:2px;}

/* ── EKF info bar ── */
.ekf-bar{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:8px 14px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:10px;
}
.ekf-chip{
  padding:4px 10px;border-radius:20px;border:1px solid;
  display:flex;align-items:center;gap:6px;
}

/* ── Empty / loader ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);}
.empty-icon{font-size:42px;opacity:.25;}
.empty p{font-size:12px;letter-spacing:1px;}
.loader{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🧭</div>
    <div>
      <h1>MagNav</h1>
      <sub>MIT LINCOLN LAB · FLIGHT DATA · ZENODO</sub>
    </div>
  </div>
  <div class="hdr-status">
    <span><span class="dot"></span>SYSTEM ONLINE</span>
    <span id="hdr-info">NO FLIGHT SELECTED</span>
  </div>
</header>

<div class="body-wrap">

  <!-- Sidebar -->
  <aside>
    <div class="aside-top"><h2>Available Flights</h2></div>
    <div class="flight-list" id="flight-list">
      <div class="empty" style="height:150px"><div class="loader"></div><p>Loading…</p></div>
    </div>
    <div class="lines-section" id="lines-section" style="display:none">
      <h3>Survey Lines</h3>
      <div class="line-grid" id="line-grid"></div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div class="empty" style="height:100%">
      <div class="empty-icon">✈️</div>
      <p>SELECT A FLIGHT TO BEGIN</p>
    </div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let charts = {};
let simTimer = null, simIdx = 0, simData = null, simRunning = false, playSpeed = 10;

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  const res  = await fetch('/api/flights');
  const list = await res.json();
  const el   = document.getElementById('flight-list');

  if (!list.length) {
    el.innerHTML = `<div class="empty" style="height:150px"><p>No .h5 files found</p><p style="font-size:10px">Check DATA_DIR in app.py</p></div>`;
    return;
  }
  el.innerHTML = '';
  list.forEach(f => {
    const c = document.createElement('div');
    c.className = 'f-card';
    c.innerHTML = `<div><div class="f-num">FLT ${f.id}</div><div class="f-meta">${f.file}</div></div>`;
    c.onclick = () => selectFlight(f, c);
    el.appendChild(c);
  });
}

// ── Select flight ─────────────────────────────────────────────────────────────
async function selectFlight(f, card) {
  document.querySelectorAll('.f-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  document.getElementById('lines-section').style.display = 'none';
  document.getElementById('hdr-info').textContent = `FLT ${f.id} · Loading lines…`;

  const res  = await fetch(`/api/flight/${f.id}`);
  const data = await res.json();

  const grid = document.getElementById('line-grid');
  grid.innerHTML = '';
  data.lines.forEach(ln => {
    const btn = document.createElement('button');
    btn.className = 'ln-btn' + (ln.is_cal ? ' cal' : '');
    btn.textContent = ln.line.toFixed(2);
    btn.title = `${ln.rows.toLocaleString()} pts · ${ln.duration_s}s${ln.is_cal ? ' · CAL' : ''}`;
    btn.onclick = () => selectLine(f.id, ln.line, btn);
    grid.appendChild(btn);
  });
  document.getElementById('lines-section').style.display = 'block';
  document.getElementById('hdr-info').textContent = `FLT ${f.id} · SELECT A LINE`;
}

// ── Select line ───────────────────────────────────────────────────────────────
async function selectLine(flightId, line, btn) {
  document.querySelectorAll('.ln-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('hdr-info').textContent = `FLT ${flightId} · LINE ${line.toFixed(2)} · COMPUTING…`;

  const main = document.getElementById('main');
  main.innerHTML = `<div class="empty" style="height:100%"><div class="loader"></div><p>RUNNING TL · NN · EKF PIPELINE…</p></div>`;

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
  if (simTimer) clearInterval(simTimer);
  simRunning = false; simIdx = 0;

  const res = await fetch(`/api/flight/${flightId}/line/${line}`);
  const d   = await res.json();

  if (d.error) {
    main.innerHTML = `<div class="empty" style="height:100%"><p>Error: ${d.error}</p></div>`;
    return;
  }
  simData = d;
  document.getElementById('hdr-info').textContent =
    `FLT ${flightId} · LINE ${line.toFixed(2)} · ${d.stats.n_points.toLocaleString()} pts · ${d.stats.duration_s}s`;

  renderDashboard(d);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderDashboard(d) {
  const s = d.stats;
  const main = document.getElementById('main');

  const hasEkf  = s.has_ekf;
  const hasIgrf = d.ekf_igrf_lat != null;
  const hasTl   = d.ekf_tl_lat   != null;
  const hasNn   = d.ekf_nn_lat   != null;

  const errStr = v => v != null ? `${v} m` : '—';
  const nT     = v => v != null ? `${v} nT` : '—';

  main.innerHTML = `
  <!-- Stats -->
  <div class="stats-row">
    <div class="sc c1"><div class="sc-lbl">Duration</div><div class="sc-val">${s.duration_s}<span class="sc-unit">s</span></div></div>
    <div class="sc c2"><div class="sc-lbl">Points</div><div class="sc-val">${s.n_points.toLocaleString()}</div></div>
    <div class="sc c3"><div class="sc-lbl">Raw Mag σ</div><div class="sc-val">${s.raw_std}<span class="sc-unit">nT</span></div></div>
    <div class="sc c4"><div class="sc-lbl">TL σ</div><div class="sc-val">${s.tl_std}<span class="sc-unit">nT</span></div></div>
    <div class="sc c5"><div class="sc-lbl">INS Error</div><div class="sc-val">${s.ins_err_mean_m}<span class="sc-unit">m</span></div></div>
    ${hasNn  ? `<div class="sc c6"><div class="sc-lbl">EKF+NN Err</div><div class="sc-val">${s.ekf_nn_err_m ?? '—'}<span class="sc-unit">m</span></div></div>` : ''}
    ${hasTl  ? `<div class="sc c2"><div class="sc-lbl">EKF+TL Err</div><div class="sc-val">${s.ekf_tl_err_m ?? '—'}<span class="sc-unit">m</span></div></div>` : ''}
    ${hasIgrf? `<div class="sc c4"><div class="sc-lbl">EKF+IGRF Err</div><div class="sc-val">${s.ekf_igrf_err_m ?? '—'}<span class="sc-unit">m</span></div></div>` : ''}
  </div>

  <!-- Sim controls -->
  <div class="sim-panel">
    <button class="sim-btn" id="btn-play" onclick="toggleSim()">▶ SIMULATE</button>
    <button class="sim-btn reset" onclick="resetSim()">↺ RESET</button>
    <div class="spd-wrap">
      <span>SPEED</span>
      <input type="range" id="spd-range" min="1" max="60" value="10"
             oninput="playSpeed=+this.value;document.getElementById('spd-lbl').textContent=this.value+'×'">
      <span id="spd-lbl">10×</span>
    </div>
    <div class="sim-track" id="sim-track">
      <div class="sim-fill" id="sim-fill"></div>
    </div>
    <div class="sim-time" id="sim-time">0s / ${s.duration_s}s</div>
  </div>

  <!-- Ground track + position error -->
  <div class="two-col">
    <div class="panel">
      <div class="ph">
        <span class="ph-title">Ground Track</span>
        <span class="ph-badge" style="border-color:var(--cyan);color:var(--cyan)">LAT / LON</span>
      </div>
      <div class="pb"><div class="cw h320"><canvas id="chart-map"></canvas></div></div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--green)"></div>GPS Truth</div>
        <div class="li"><div class="ld" style="background:var(--muted);border-top:1px dashed var(--muted)"></div>INS DR</div>
        ${hasIgrf?`<div class="li"><div class="ld" style="background:var(--purple)"></div>EKF+IGRF</div>`:''}
        ${hasTl  ?`<div class="li"><div class="ld" style="background:var(--orange)"></div>EKF+TL</div>`:''}
        ${hasNn  ?`<div class="li"><div class="ld" style="background:var(--cyan)"></div>EKF+NN</div>`:''}
      </div>
    </div>

    <div class="panel">
      <div class="ph">
        <span class="ph-title">Position Error vs GPS</span>
        <span class="ph-badge" style="border-color:var(--orange);color:var(--orange)">METRES</span>
      </div>
      <div class="pb"><div class="cw h320"><canvas id="chart-err"></canvas></div></div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--muted)"></div>INS</div>
        ${hasIgrf?`<div class="li"><div class="ld" style="background:var(--purple)"></div>EKF+IGRF</div>`:''}
        ${hasTl  ?`<div class="li"><div class="ld" style="background:var(--orange)"></div>EKF+TL</div>`:''}
        ${hasNn  ?`<div class="li"><div class="ld" style="background:var(--cyan)"></div>EKF+NN</div>`:''}
      </div>
      ${hasEkf ? `
      <div class="ekf-bar">
        ${hasIgrf?`<div class="ekf-chip" style="border-color:var(--purple);color:var(--purple)"><span>EKF+IGRF</span><strong>${errStr(s.ekf_igrf_err_m)}</strong></div>`:''}
        ${hasTl  ?`<div class="ekf-chip" style="border-color:var(--orange);color:var(--orange)"><span>EKF+TL</span><strong>${errStr(s.ekf_tl_err_m)}</strong></div>`:''}
        ${hasNn  ?`<div class="ekf-chip" style="border-color:var(--cyan);color:var(--cyan)"><span>EKF+NN</span><strong>${errStr(s.ekf_nn_err_m)}</strong></div>`:''}
        <div class="ekf-chip" style="border-color:var(--muted);color:var(--muted)"><span>INS only</span><strong>${errStr(s.ins_err_mean_m)}</strong></div>
      </div>` : ''}
    </div>
  </div>

  <!-- Magnetometer signals -->
  <div class="panel">
    <div class="ph">
      <span class="ph-title">Magnetometer Signals</span>
      <span class="ph-badge" style="border-color:var(--green);color:var(--green)">nT</span>
    </div>
    <div class="pb"><div class="cw h260"><canvas id="chart-mag"></canvas></div></div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#555"></div>Raw (mag_1_lag)</div>
      <div class="li"><div class="ld" style="background:var(--orange)"></div>TL Compensated</div>
      <div class="li"><div class="ld" style="background:var(--cyan)"></div>NN Compensated</div>
      ${d.mag_mit  ?`<div class="li"><div class="ld" style="background:var(--green)"></div>MIT Reference</div>`:''}
    </div>
  </div>

  <!-- EKF Innovation + Attitude -->
  <div class="two-col">
    ${hasEkf ? `
    <div class="panel">
      <div class="ph">
        <span class="ph-title">EKF Innovation</span>
        <span class="ph-badge" style="border-color:var(--purple);color:var(--purple)">nT · zero-mean = well-tuned</span>
      </div>
      <div class="pb"><div class="cw h200"><canvas id="chart-innov"></canvas></div></div>
      <div class="legend">
        ${hasIgrf?`<div class="li"><div class="ld" style="background:var(--purple)"></div>IGRF</div>`:''}
        ${hasTl  ?`<div class="li"><div class="ld" style="background:var(--orange)"></div>TL</div>`:''}
        ${hasNn  ?`<div class="li"><div class="ld" style="background:var(--cyan)"></div>NN</div>`:''}
      </div>
    </div>` : `
    <div class="panel">
      <div class="ph"><span class="ph-title">EKF Innovation</span></div>
      <div class="pb"><div class="empty" style="height:200px"><p>emag_up.tif not found — EKF disabled</p></div></div>
    </div>`}

    <div class="panel">
      <div class="ph">
        <span class="ph-title">Aircraft Attitude (INS)</span>
        <span class="ph-badge" style="border-color:var(--purple);color:var(--purple)">DEG</span>
      </div>
      <div class="pb"><div class="cw h200"><canvas id="chart-att"></canvas></div></div>
      <div class="legend">
        <div class="li"><div class="ld" style="background:var(--red)"></div>Pitch</div>
        <div class="li"><div class="ld" style="background:var(--cyan)"></div>Roll</div>
        <div class="li"><div class="ld" style="background:var(--orange)"></div>Altitude (m, right)</div>
      </div>
    </div>
  </div>
  `;

  // ── Timeline scrub ──────────────────────────────────────────────────────────
  const track = document.getElementById('sim-track');
  let scrubbing = false;
  track.addEventListener('mousedown', e => { scrubbing = true; doScrub(e); });
  window.addEventListener('mousemove', e => { if (scrubbing) doScrub(e); });
  window.addEventListener('mouseup',  () => { scrubbing = false; });
  function doScrub(e) {
    const r = track.getBoundingClientRect();
    simIdx = Math.round(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * (simData.t.length - 1));
    updateSimFrame(simIdx);
  }

  buildCharts(d);
  updateSimFrame(0);
}

// ── Chart helpers ──────────────────────────────────────────────────────────────
const BASE_OPT = {
  responsive: true, maintainAspectRatio: false,
  animation: { duration: 0 },
  plugins: {
    legend: { display: false },
    tooltip: {
      mode: 'index', intersect: false,
      backgroundColor: 'rgba(7,9,15,.95)',
      borderColor: '#1a2535', borderWidth: 1,
      titleColor: '#00d4ff', bodyColor: '#c8d8e8',
      titleFont: { family: 'Space Mono', size: 9 },
      bodyFont:  { family: 'Space Mono', size: 9 },
    }
  },
  scales: {
    x: { display: true, grid: { color: 'rgba(26,37,53,.7)' },
         ticks: { color: '#3d5470', font: { family: 'Space Mono', size: 8 }, maxTicksLimit: 8 }},
    y: { display: true, grid: { color: 'rgba(26,37,53,.7)' },
         ticks: { color: '#3d5470', font: { family: 'Space Mono', size: 8 }, maxTicksLimit: 6 }},
  }
};

function tl(t) { return t.map(v => v != null ? v.toFixed(0) : ''); }
function zip(xs, ys) {
  if (!xs || !ys) return [];
  return xs.map((x, i) => ({ x, y: ys[i] }));
}

function buildCharts(d) {
  const t = tl(d.t);
  const hasIgrf = d.ekf_igrf_lat != null;
  const hasTl   = d.ekf_tl_lat   != null;
  const hasNn   = d.ekf_nn_lat   != null;

  // ── Ground track ────────────────────────────────────────────────────────────
  const mapDs = [
    { label:'GPS Truth', data: zip(d.gps_lon, d.gps_lat),
      borderColor:'#00e87a', backgroundColor:'transparent', showLine:true, borderWidth:2, pointRadius:0 },
    { label:'INS', data: zip(d.ins_lon, d.ins_lat),
      borderColor:'#3d5470', backgroundColor:'transparent', showLine:true, borderWidth:1, pointRadius:0, borderDash:[4,3] },
  ];
  if (hasIgrf) mapDs.push({ label:'EKF+IGRF', data: zip(d.ekf_igrf_lon, d.ekf_igrf_lat), borderColor:'#a855f7', backgroundColor:'transparent', showLine:true, borderWidth:1, pointRadius:0 });
  if (hasTl)   mapDs.push({ label:'EKF+TL',   data: zip(d.ekf_tl_lon,   d.ekf_tl_lat),   borderColor:'#ff8c42', backgroundColor:'transparent', showLine:true, borderWidth:1.2, pointRadius:0 });
  if (hasNn)   mapDs.push({ label:'EKF+NN',   data: zip(d.ekf_nn_lon,   d.ekf_nn_lat),   borderColor:'#00d4ff', backgroundColor:'transparent', showLine:true, borderWidth:1.6, pointRadius:0 });
  // Live markers (GPS, EKF+NN)
  mapDs.push({ label:'Live GPS',    data:[{x:d.gps_lon[0],y:d.gps_lat[0]}],    borderColor:'#00e87a', backgroundColor:'#00e87a', pointRadius:8, pointStyle:'triangle', showLine:false });
  if (hasNn) mapDs.push({ label:'Live NN', data:[{x:d.ekf_nn_lon[0],y:d.ekf_nn_lat[0]}], borderColor:'#00d4ff', backgroundColor:'#00d4ff', pointRadius:7, pointStyle:'circle', showLine:false });

  charts.map = new Chart(document.getElementById('chart-map'), {
    type:'scatter', data:{ datasets: mapDs },
    options:{ ...BASE_OPT,
      scales:{
        x:{ ...BASE_OPT.scales.x, title:{display:true,text:'Longitude (°)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
        y:{ ...BASE_OPT.scales.y, title:{display:true,text:'Latitude (°)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
      }
    }
  });

  // ── Position error ──────────────────────────────────────────────────────────
  const errDs = [
    { label:'INS', data:d.ins_err, borderColor:'#3d5470', backgroundColor:'rgba(61,84,112,.04)', fill:true, borderWidth:1.2, pointRadius:0, tension:.15 },
  ];
  if (hasIgrf && d.err_igrf) errDs.push({ label:'EKF+IGRF', data:d.err_igrf, borderColor:'#a855f7', backgroundColor:'rgba(168,85,247,.04)', fill:true, borderWidth:1, pointRadius:0, tension:.15 });
  if (hasTl   && d.err_tl)   errDs.push({ label:'EKF+TL',   data:d.err_tl,   borderColor:'#ff8c42', backgroundColor:'rgba(255,140,66,.04)',  fill:true, borderWidth:1.2, pointRadius:0, tension:.15 });
  if (hasNn   && d.err_nn)   errDs.push({ label:'EKF+NN',   data:d.err_nn,   borderColor:'#00d4ff', backgroundColor:'rgba(0,212,255,.05)',   fill:true, borderWidth:1.5, pointRadius:0, tension:.15 });
  // Vertical cursor line
  errDs.push({ label:'cursor', data:[], borderColor:'rgba(255,255,255,.3)', borderWidth:1, pointRadius:0, borderDash:[3,4], showLine:true });

  charts.err = new Chart(document.getElementById('chart-err'), {
    type:'line', data:{ labels:t, datasets:errDs },
    options:{ ...BASE_OPT,
      scales:{
        x:{ ...BASE_OPT.scales.x, title:{display:true,text:'Time (s)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
        y:{ ...BASE_OPT.scales.y, title:{display:true,text:'Error (m)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
      }
    }
  });

  // ── Mag signals ─────────────────────────────────────────────────────────────
  const magDs = [
    { label:'Raw',  data:d.mag_raw, borderColor:'#555', borderWidth:.8, pointRadius:0, tension:0 },
    { label:'TL',   data:d.mag_tl,  borderColor:'#ff8c42', borderWidth:1.2, pointRadius:0, tension:0 },
    { label:'NN',   data:d.mag_nn,  borderColor:'#00d4ff', borderWidth:1.2, pointRadius:0, tension:0 },
  ];
  if (d.mag_mit)  magDs.push({ label:'MIT',  data:d.mag_mit,  borderColor:'#00e87a', borderWidth:1, pointRadius:0, tension:0, borderDash:[5,3] });
  if (d.mag_igrf) magDs.push({ label:'IGRF', data:d.mag_igrf, borderColor:'#a855f7', borderWidth:.8, pointRadius:0, tension:0, hidden:true });

  charts.mag = new Chart(document.getElementById('chart-mag'), {
    type:'line', data:{ labels:t, datasets:magDs },
    options:{ ...BASE_OPT,
      scales:{
        x:{ ...BASE_OPT.scales.x, title:{display:true,text:'Time (s)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
        y:{ ...BASE_OPT.scales.y, title:{display:true,text:'Field (nT)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
      }
    }
  });

  // ── EKF innovation ──────────────────────────────────────────────────────────
  const innovEl = document.getElementById('chart-innov');
  if (innovEl) {
    const innovDs = [];
    if (d.ekf_igrf_innov) innovDs.push({ label:'IGRF', data:d.ekf_igrf_innov, borderColor:'#a855f7', borderWidth:.8, pointRadius:0, tension:0 });
    if (d.ekf_tl_innov)   innovDs.push({ label:'TL',   data:d.ekf_tl_innov,   borderColor:'#ff8c42', borderWidth:1,  pointRadius:0, tension:0 });
    if (d.ekf_nn_innov)   innovDs.push({ label:'NN',   data:d.ekf_nn_innov,   borderColor:'#00d4ff', borderWidth:1,  pointRadius:0, tension:0 });

    charts.innov = new Chart(innovEl, {
      type:'line', data:{ labels:t, datasets:innovDs },
      options:{ ...BASE_OPT,
        plugins:{ ...BASE_OPT.plugins,
          annotation:{ annotations:[{ type:'line', yMin:0, yMax:0, borderColor:'rgba(255,255,255,.2)', borderWidth:1, borderDash:[3,4] }] }
        },
        scales:{
          x:{ ...BASE_OPT.scales.x, title:{display:true,text:'Time (s)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
          y:{ ...BASE_OPT.scales.y, title:{display:true,text:'Innovation (nT)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
        }
      }
    });
  }

  // ── Attitude ────────────────────────────────────────────────────────────────
  charts.att = new Chart(document.getElementById('chart-att'), {
    type:'line',
    data:{ labels:t, datasets:[
      { label:'Pitch', data:d.pitch, borderColor:'#ff4d6d', borderWidth:1,   pointRadius:0, tension:.1, yAxisID:'y' },
      { label:'Roll',  data:d.roll,  borderColor:'#00d4ff', borderWidth:1,   pointRadius:0, tension:.1, yAxisID:'y' },
      { label:'Alt',   data:d.alt,   borderColor:'#ff8c42', borderWidth:1,   pointRadius:0, tension:.1, yAxisID:'y2', borderDash:[4,3] },
    ]},
    options:{ ...BASE_OPT,
      scales:{
        x:  { ...BASE_OPT.scales.x, title:{display:true,text:'Time (s)',color:'#3d5470',font:{family:'Space Mono',size:8}} },
        y:  { ...BASE_OPT.scales.y, title:{display:true,text:'Degrees',color:'#3d5470',font:{family:'Space Mono',size:8}}, position:'left' },
        y2: { ...BASE_OPT.scales.y, title:{display:true,text:'Alt (m)',color:'#ff8c42',font:{family:'Space Mono',size:8}}, position:'right', grid:{drawOnChartArea:false} },
      }
    }
  });
}

// ── Simulation ────────────────────────────────────────────────────────────────
function toggleSim() {
  if (!simData) return;
  simRunning = !simRunning;
  const btn = document.getElementById('btn-play');
  btn.textContent = simRunning ? '⏸ PAUSE' : '▶ SIMULATE';
  btn.classList.toggle('active', simRunning);
  if (simRunning) runSim();
  else clearInterval(simTimer);
}

function resetSim() {
  simIdx = 0; simRunning = false;
  clearInterval(simTimer);
  const btn = document.getElementById('btn-play');
  if (btn) { btn.textContent = '▶ SIMULATE'; btn.classList.remove('active'); }
  updateSimFrame(0);
}

function runSim() {
  clearInterval(simTimer);
  const STEP = Math.max(1, Math.round(playSpeed * 0.5));
  simTimer = setInterval(() => {
    if (!simRunning) { clearInterval(simTimer); return; }
    simIdx = Math.min(simIdx + STEP, simData.t.length - 1);
    updateSimFrame(simIdx);
    if (simIdx >= simData.t.length - 1) {
      simRunning = false; clearInterval(simTimer);
      const btn = document.getElementById('btn-play');
      if (btn) { btn.textContent = '▶ SIMULATE'; btn.classList.remove('active'); }
    }
  }, 50);
}

function updateSimFrame(idx) {
  const d   = simData;
  const N   = d.t.length;
  const pct = (idx / (N - 1)) * 100;
  const tNow = d.t[idx] ?? 0;

  const fill = document.getElementById('sim-fill');
  const time = document.getElementById('sim-time');
  if (fill) fill.style.width = pct + '%';
  if (time) time.textContent = `${tNow.toFixed(0)}s / ${d.stats.duration_s}s`;

  // Update live plane markers on ground-track chart
  if (charts.map) {
    const ds = charts.map.data.datasets;
    // live GPS marker = last 2 datasets (GPS, NN)
    const liveGpsDsIdx  = ds.findIndex(x => x.label === 'Live GPS');
    const liveNnDsIdx   = ds.findIndex(x => x.label === 'Live NN');
    if (liveGpsDsIdx >= 0) ds[liveGpsDsIdx].data = [{ x: d.gps_lon[idx], y: d.gps_lat[idx] }];
    if (liveNnDsIdx  >= 0 && d.ekf_nn_lon) ds[liveNnDsIdx].data  = [{ x: d.ekf_nn_lon[idx], y: d.ekf_nn_lat[idx] }];
    charts.map.update('none');
  }

  // Draw vertical cursor on error chart
  if (charts.err) {
    const cursorDs = charts.err.data.datasets.find(x => x.label === 'cursor');
    if (cursorDs) {
      // vertical line: two points at same x index, min/max y
      const ys = [0, Math.max(...[d.ins_err, d.err_tl, d.err_nn, d.err_igrf]
        .filter(Boolean).map(arr => arr[idx] ?? 0))];
      cursorDs.data = [ { x: d.t[idx]?.toFixed(0) ?? '0', y: ys[0] }, { x: d.t[idx]?.toFixed(0) ?? '0', y: ys[1] } ];
      charts.err.update('none');
    }
  }
}

boot();
</script>
